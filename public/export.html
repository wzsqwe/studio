<!DOCTYPE html>
<html>
<head>
  <title>数据导出工具</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .btn { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; background: #0071e3; color: white; border: none; border-radius: 8px; }
    textarea { width: 100%; height: 300px; margin: 10px 0; font-size: 12px; }
    .info { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>📤 数据导出工具</h1>
  
  <div class="info">
    <strong>使用方法：</strong><br>
    1. 点击下方按钮导出数据<br>
    2. 复制 textarea 里的所有内容<br>
    3. 把内容发给我
  </div>
  
  <button class="btn" onclick="exportData()">📤 导出所有数据</button>
  
  <h3>导出的数据（复制下面的内容给我）：</h3>
  <textarea id="output" placeholder="点击上方按钮导出数据..."></textarea>
  
  <button class="btn" onclick="clearData()" style="background: #ef4444;">🗑️ 清空本地数据（慎用）</button>
  
  <script>
    function exportData() {
      const data = {
        projects: JSON.parse(localStorage.getItem('ps_projects') || '[]'),
        clients: JSON.parse(localStorage.getItem('ps_clients') || '[]'),
        transactions: JSON.parse(localStorage.getItem('ps_transactions') || '[]')
      };
      document.getElementById('output').value = JSON.stringify(data, null, 2);
    }
    
    function clearData() {
      if (confirm('确定要清空所有本地数据吗？此操作不可恢复！')) {
        localStorage.clear();
        alert('已清空！');
      }
    }
  </script>
</body>
</html>
