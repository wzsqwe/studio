<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoStudio Pro - 摄影师管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 240px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar h1 { font-size: 18px; margin-bottom: 30px; }
    .nav-menu { list-style: none; }
    .nav-menu li { margin-bottom: 8px; }
    .nav-menu a { display: flex; align-items: center; padding: 12px; color: #ccc; text-decoration: none; border-radius: 8px; transition: all 0.3s; }
    .nav-menu a:hover, .nav-menu a.active { background: rgba(255,255,255,0.1); color: white; }
    .nav-menu a svg { margin-right: 10px; width: 18px; height: 18px; }
    .main { flex: 1; margin-left: 240px; padding: 30px; overflow-y: auto; height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-header h2 { font-size: 24px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-danger { background: #ef4444; color: white; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card .value { font-size: 32px; font-weight: 700; margin: 10px 0; }
    .stat-card.income .value { color: #22c55e; }
    .stat-card.expense .value { color: #ef4444; }
    .stat-card.profit .value { color: #667eea; }
    .stat-card .label { font-size: 14px; color: #666; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .table th { background: #f8f9fa; font-weight: 600; color: #666; }
    .table tr:hover { background: #f8f9fa; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-completed { background: #dcfce7; color: #16a34a; }
    .badge-progress { background: #fef3c7; color: #d97706; }
    .badge-pending { background: #dbeafe; color: #2563eb; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; }
    .modal h3 { margin-bottom: 20px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .filter-bar { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .chart-container { height: 300px; }
    @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main { margin-left: 0; padding: 15px; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>📷 PhotoStudio</h1>
      <ul class="nav-menu">
        <li><a href="#" onclick="showPage('dashboard')" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>总览</a></li>
        <li><a href="#" onclick="showPage('projects')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>项目管理</a></li>
        <li><a href="#" onclick="showPage('clients')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>客户管理</a></li>
        <li><a href="#" onclick="showPage('transactions')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>交易记录</a></li>
        <li><a href="#" onclick="showPage('calendar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>日程日历</a></li>
        <li><a href="#" onclick="showPage('statistics')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>数据统计</a></li>
        <li><a href="#" onclick="showPage('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>系统设置</a></li>
      </ul>
    </aside>
    <main class="main" id="main-content">
      <div style="text-align:center;padding:100px;color:#666"><div style="font-size:48px;margin-bottom:20px">⏳</div><h2>正在初始化数据库...</h2><p>请稍候，系统正在准备数据</p></div>
    </main>
  </div>

  <script>
    const DB_NAME = 'PhotoStudioDB';
    const DB_VERSION = 1;
    let db = null;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = (e) => reject(new Error('数据库错误: ' + e.target.error));
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          const tables = [
            { name: 'clients', keyPath: 'id', indexes: [{ name: 'name', keyPath: 'name' }] },
            { name: 'projects', keyPath: 'id', indexes: [{ name: 'client_name', keyPath: 'client_name' }, { name: 'status', keyPath: 'status' }] },
            { name: 'transactions', keyPath: 'id', indexes: [{ name: 'type', keyPath: 'type' }, { name: 'date', keyPath: 'date' }] },
            { name: 'settings', keyPath: 'key' }
          ];
          tables.forEach(table => {
            if (!database.objectStoreNames.contains(table.name)) {
              const store = database.createObjectStore(table.name, { keyPath: table.keyPath });
              table.indexes.forEach(index => store.createIndex(index.name, index.keyPath));
            }
          });
        };
      });
    };

    const getAll = (storeName) => {
      return new Promise((resolve) => {
        const tx = db.transaction([storeName], 'readonly');
        const store = tx.objectStore(storeName);
        store.getAll().onsuccess = (e) => resolve(e.target.result);
      });
    };

    const addData = (storeName, data) => {
      return new Promise((resolve) => {
        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        store.put(data).onsuccess = () => resolve();
      });
    };

    const deleteData = (storeName, id) => {
      return new Promise((resolve) => {
        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        store.delete(id).onsuccess = () => resolve();
      });
    };

    const sampleProjects = [
      { id: 'p1', name: '费列罗', type: '商业拍摄', client_name: '费列罗', total_amount: 26500, status: '已完结', order_date: '2026-01-01', shoot_date: '2026-01-15', profit_rate: 60 },
      { id: 'p2', name: '上海港口', type: '商业拍摄', client_name: '上海港口', total_amount: 36000, status: '已完结', order_date: '2026-01-05', shoot_date: '2026-01-20', profit_rate: 55 },
      { id: 'p3', name: '长虹电视', type: '产品拍摄', client_name: '长虹', total_amount: 10000, status: '已完结', order_date: '2026-01-10', shoot_date: '2026-01-25', profit_rate: 45 },
      { id: 'p4', name: '星星冷链', type: '商业拍摄', client_name: '星星冷链', total_amount: 40000, status: '已完结', order_date: '2026-02-01', shoot_date: '2026-02-10', profit_rate: 50 },
      { id: 'p5', name: '上海华为研发', type: '商业拍摄', client_name: '华为', total_amount: 70000, status: '进行中', order_date: '2026-02-10', shoot_date: '2026-02-20', profit_rate: 55 },
      { id: 'p6', name: '莱州养鸡场', type: '商业拍摄', client_name: '莱州养鸡场', total_amount: 71000, status: '已完结', order_date: '2026-04-05', shoot_date: '2026-04-15', profit_rate: 58 },
      { id: 'p7', name: '9号电动车', type: '产品拍摄', client_name: '九号公司', total_amount: 9500, status: '进行中', order_date: '2026-04-01', shoot_date: '2026-04-10', profit_rate: 45 },
      { id: 'p8', name: '东阿阿胶', type: '产品拍摄', client_name: '东阿阿胶', total_amount: 20000, status: '进行中', order_date: '2026-06-20', shoot_date: '2026-07-01', profit_rate: 50 },
      { id: 'p9', name: '山科大宣传片', type: '商业拍摄', client_name: '山东科技大学', total_amount: 25000, status: '进行中', order_date: '2026-06-01', shoot_date: '2026-06-10', profit_rate: 55 },
      { id: 'p10', name: '一汽', type: '商业拍摄', client_name: '一汽', total_amount: 12000, status: '已完结', order_date: '2026-05-05', shoot_date: '2026-05-15', profit_rate: 48 },
    ];

    const sampleClients = [
      { id: 'c1', name: '费列罗', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c2', name: '上海港口', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c3', name: '长虹', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c4', name: '星星冷链', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c5', name: '华为', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c6', name: '莱州养鸡场', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c7', name: '九号公司', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c8', name: '东阿阿胶', type: '企业客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c9', name: '山东科技大学', type: '机构客户', contact: '', phone: '', email: '', address: '' },
      { id: 'c10', name: '一汽', type: '企业客户', contact: '', phone: '', email: '', address: '' },
    ];

    const sampleTransactions = [
      { id: 't1', type: '收入', category: '项目收入', amount: 26500, date: '2026-01-15', description: '费列罗项目' },
      { id: 't2', type: '收入', category: '项目收入', amount: 36000, date: '2026-01-20', description: '上海港口项目' },
      { id: 't3', type: '收入', category: '项目收入', amount: 40000, date: '2026-02-10', description: '星星冷链项目' },
      { id: 't4', type: '收入', category: '项目收入', amount: 71000, date: '2026-04-15', description: '莱州养鸡场项目' },
      { id: 't5', type: '收入', category: '项目收入', amount: 12000, date: '2026-05-15', description: '一汽项目' },
      { id: 't6', type: '支出', category: '器材费用', amount: 50000, date: '2026-01-01', description: '年度器材采购' },
      { id: 't7', type: '支出', category: '场地费用', amount: 30000, date: '2026-01-01', description: '工作室租金' },
      { id: 't8', type: '支出', category: '后期制作', amount: 20000, date: '2026-01-01', description: '外包后期费用' },
      { id: 't9', type: '收入', category: '被动收入', amount: 60000, date: '2026-06-30', description: '年基准被动收入' },
      { id: 't10', type: '收入', category: '被动收入', amount: 60000, date: '2026-01-01', description: '被动收入' },
    ];

    const initData = async () => {
      const projects = await getAll('projects');
      if (projects.length === 0) {
        for (const p of sampleProjects) await addData('projects', p);
        for (const c of sampleClients) await addData('clients', c);
        for (const t of sampleTransactions) await addData('transactions', t);
      }
    };

    const showPage = (page) => {
      document.querySelectorAll('.nav-menu a').forEach(a => a.classList.remove('active'));
      event.target.classList.add('active');
      const content = document.getElementById('main-content');
      content.innerHTML = '';
      if (page === 'dashboard') renderDashboard(content);
      else if (page === 'projects') renderProjects(content);
      else if (page === 'clients') renderClients(content);
      else if (page === 'transactions') renderTransactions(content);
      else if (page === 'calendar') renderCalendar(content);
      else if (page === 'statistics') renderStatistics(content);
      else if (page === 'settings') renderSettings(content);
    };

    const formatMoney = (amount) => '¥' + amount.toLocaleString();

    const renderDashboard = async (container) => {
      const [projects, transactions] = await Promise.all([getAll('projects'), getAll('transactions')]);
      const today = new Date();
      const currMonth = today.toISOString().slice(0, 7);
      const monthTxns = transactions.filter(t => t.date?.startsWith(currMonth));
      const monthIncome = monthTxns.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0);
      const monthExpense = monthTxns.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0);
      const yearTxns = transactions.filter(t => t.date?.startsWith(today.getFullYear().toString()));
      const yearIncome = yearTxns.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0);
      const yearExpense = yearTxns.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0);

      container.innerHTML = `
        <div class="page-header"><h2>数据总览</h2></div>
        <div class="stats-grid">
          <div class="stat-card income"><div class="label">本月收入</div><div class="value">${formatMoney(monthIncome)}</div></div>
          <div class="stat-card expense"><div class="label">本月支出</div><div class="value">${formatMoney(monthExpense)}</div></div>
          <div class="stat-card profit"><div class="label">本月利润</div><div class="value">${formatMoney(monthIncome - monthExpense)}</div></div>
          <div class="stat-card"><div class="label">项目总数</div><div class="value">${projects.length}</div></div>
          <div class="stat-card"><div class="label">年度收入</div><div class="value">${formatMoney(yearIncome)}</div></div>
          <div class="stat-card"><div class="label">年度利润</div><div class="value">${formatMoney(yearIncome - yearExpense)}</div></div>
        </div>
        <div class="card">
          <div class="card-title">最近项目</div>
          <table class="table">
            <thead><tr><th>项目名称</th><th>客户</th><th>金额</th><th>状态</th><th>日期</th></tr></thead>
            <tbody>${projects.slice(0, 5).map(p => `<tr><td>${p.name}</td><td>${p.client_name}</td><td>${formatMoney(p.total_amount)}</td><td><span class="badge badge-${p.status === '已完结' ? 'completed' : p.status === '进行中' ? 'progress' : 'pending'}">${p.status}</span></td><td>${p.shoot_date}</td></tr>`).join('')}</tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-title">收支趋势</div>
          <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
      `;

      setTimeout(() => {
        const monthlyData = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
          const month = d.toISOString().slice(0, 7);
          const mTxns = transactions.filter(t => t.date?.startsWith(month));
          monthlyData.push({ month: month.slice(5), income: mTxns.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0), expense: mTxns.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0) });
        }
        new Chart(document.getElementById('trendChart'), {
          type: 'line',
          data: {
            labels: monthlyData.map(d => d.month),
            datasets: [{ label: '收入', data: monthlyData.map(d => d.income), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true },
                       { label: '支出', data: monthlyData.map(d => d.expense), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }, 100);
    };

    const renderProjects = async (container) => {
      const projects = await getAll('projects');
      container.innerHTML = `
        <div class="page-header"><h2>项目管理</h2><button class="btn btn-primary" onclick="openProjectModal()">+ 新建项目</button></div>
        <div class="filter-bar">
          <input type="text" placeholder="搜索..." id="projectSearch" oninput="renderProjects(document.getElementById('main-content'))">
          <select id="projectStatus" onchange="renderProjects(document.getElementById('main-content'))">
            <option value="">全部状态</option><option value="进行中">进行中</option><option value="已完结">已完结</option>
          </select>
        </div>
        <div class="card">
          <table class="table">
            <thead><tr><th>项目名称</th><th>客户</th><th>类型</th><th>金额</th><th>利润率</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>${projects.filter(p => {
              const search = document.getElementById('projectSearch')?.value.toLowerCase() || '';
              const status = document.getElementById('projectStatus')?.value || '';
              return (!search || p.name.toLowerCase().includes(search) || p.client_name.toLowerCase().includes(search)) && (!status || p.status === status);
            }).map(p => `<tr><td>${p.name}</td><td>${p.client_name}</td><td>${p.type}</td><td>${formatMoney(p.total_amount)}</td><td>${p.profit_rate}%</td><td><span class="badge badge-${p.status === '已完结' ? 'completed' : p.status === '进行中' ? 'progress' : 'pending'}">${p.status}</span></td><td><button class="btn btn-secondary" onclick="editProject('${p.id}')">编辑</button><button class="btn btn-danger" onclick="deleteProject('${p.id}')">删除</button></td></tr>`).join('')}</tbody>
          </table>
        </div>
      `;
    };

    const openProjectModal = (project = null) => {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>${project ? '编辑项目' : '新建项目'}</h3>
          <div class="form-group"><label>项目名称</label><input type="text" id="projName" value="${project?.name || ''}"></div>
          <div class="form-group"><label>客户名称</label><input type="text" id="projClient" value="${project?.client_name || ''}"></div>
          <div class="form-group"><label>类型</label><select id="projType"><option value="商业拍摄">商业拍摄</option><option value="产品拍摄">产品拍摄</option><option value="个人写真">个人写真</option></select></div>
          <div class="form-group"><label>金额</label><input type="number" id="projAmount" value="${project?.total_amount || ''}"></div>
          <div class="form-group"><label>利润率</label><input type="number" id="projProfit" value="${project?.profit_rate || ''}"></div>
          <div class="form-group"><label>状态</label><select id="projStatus"><option value="进行中">进行中</option><option value="已完结">已完结</option><option value="待收款">待收款</option></select></div>
          <div class="form-group"><label>拍摄日期</label><input type="date" id="projDate" value="${project?.shoot_date || ''}"></div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="btn btn-primary" onclick="saveProject('${project?.id || ''}')">保存</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('projType').value = project?.type || '商业拍摄';
      document.getElementById('projStatus').value = project?.status || '进行中';
    };

    const saveProject = async (id) => {
      const project = {
        id: id || 'p' + Date.now(),
        name: document.getElementById('projName').value,
        client_name: document.getElementById('projClient').value,
        type: document.getElementById('projType').value,
        total_amount: parseFloat(document.getElementById('projAmount').value) || 0,
        profit_rate: parseFloat(document.getElementById('projProfit').value) || 0,
        status: document.getElementById('projStatus').value,
        shoot_date: document.getElementById('projDate').value
      };
      await addData('projects', project);
      document.querySelector('.modal-overlay').remove();
      renderProjects(document.getElementById('main-content'));
    };

    const editProject = async (id) => {
      const projects = await getAll('projects');
      const project = projects.find(p => p.id === id);
      if (project) openProjectModal(project);
    };

    const deleteProject = async (id) => {
      if (confirm('确定删除？')) {
        await deleteData('projects', id);
        renderProjects(document.getElementById('main-content'));
      }
    };

    const renderClients = async (container) => {
      const clients = await getAll('clients');
      container.innerHTML = `
        <div class="page-header"><h2>客户管理</h2><button class="btn btn-primary" onclick="openClientModal()">+ 新建客户</button></div>
        <div class="card">
          <table class="table">
            <thead><tr><th>客户名称</th><th>类型</th><th>电话</th><th>邮箱</th><th>操作</th></tr></thead>
            <tbody>${clients.map(c => `<tr><td>${c.name}</td><td>${c.type}</td><td>${c.phone || '-'}</td><td>${c.email || '-'}</td><td><button class="btn btn-secondary" onclick="editClient('${c.id}')">编辑</button><button class="btn btn-danger" onclick="deleteClient('${c.id}')">删除</button></td></tr>`).join('')}</tbody>
          </table>
        </div>
      `;
    };

    const openClientModal = (client = null) => {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>${client ? '编辑客户' : '新建客户'}</h3>
          <div class="form-group"><label>客户名称</label><input type="text" id="clientName" value="${client?.name || ''}"></div>
          <div class="form-group"><label>类型</label><select id="clientType"><option value="企业客户">企业客户</option><option value="机构客户">机构客户</option><option value="个人客户">个人客户</option></select></div>
          <div class="form-group"><label>电话</label><input type="tel" id="clientPhone" value="${client?.phone || ''}"></div>
          <div class="form-group"><label>邮箱</label><input type="email" id="clientEmail" value="${client?.email || ''}"></div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="btn btn-primary" onclick="saveClient('${client?.id || ''}')">保存</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('clientType').value = client?.type || '企业客户';
    };

    const saveClient = async (id) => {
      const client = {
        id: id || 'c' + Date.now(),
        name: document.getElementById('clientName').value,
        type: document.getElementById('clientType').value,
        phone: document.getElementById('clientPhone').value,
        email: document.getElementById('clientEmail').value
      };
      await addData('clients', client);
      document.querySelector('.modal-overlay').remove();
      renderClients(document.getElementById('main-content'));
    };

    const editClient = async (id) => {
      const clients = await getAll('clients');
      const client = clients.find(c => c.id === id);
      if (client) openClientModal(client);
    };

    const deleteClient = async (id) => {
      if (confirm('确定删除？')) {
        await deleteData('clients', id);
        renderClients(document.getElementById('main-content'));
      }
    };

    const renderTransactions = async (container) => {
      const transactions = await getAll('transactions');
      container.innerHTML = `
        <div class="page-header"><h2>交易记录</h2><button class="btn btn-primary" onclick="openTxnModal()">+ 新增记录</button></div>
        <div class="filter-bar">
          <select id="txnType" onchange="renderTransactions(document.getElementById('main-content'))">
            <option value="">全部类型</option><option value="收入">收入</option><option value="支出">支出</option>
          </select>
        </div>
        <div class="card">
          <table class="table">
            <thead><tr><th>日期</th><th>类型</th><th>类别</th><th>金额</th><th>备注</th><th>操作</th></tr></thead>
            <tbody>${transactions.filter(t => {
              const type = document.getElementById('txnType')?.value || '';
              return !type || t.type === type;
            }).sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => `<tr><td>${t.date}</td><td><span class="badge badge-${t.type === '收入' ? 'completed' : 'pending'}">${t.type}</span></td><td>${t.category}</td><td style="color:${t.type === '收入' ? '#22c55e' : '#ef4444'}">${t.type === '收入' ? '+' : '-'}${formatMoney(t.amount)}</td><td>${t.description || '-'}</td><td><button class="btn btn-danger" onclick="deleteTxn('${t.id}')">删除</button></td></tr>`).join('')}</tbody>
          </table>
        </div>
      `;
    };

    const openTxnModal = () => {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>新增记录</h3>
          <div class="form-group"><label>类型</label><select id="txnType"><option value="收入">收入</option><option value="支出">支出</option></select></div>
          <div class="form-group"><label>类别</label><select id="txnCategory"><option value="项目收入">项目收入</option><option value="被动收入">被动收入</option><option value="器材费用">器材费用</option><option value="场地费用">场地费用</option><option value="其他费用">其他费用</option></select></div>
          <div class="form-group"><label>金额</label><input type="number" id="txnAmount"></div>
          <div class="form-group"><label>日期</label><input type="date" id="txnDate" value="${new Date().toISOString().slice(0, 10)}"></div>
          <div class="form-group"><label>备注</label><input type="text" id="txnDesc"></div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="btn btn-primary" onclick="saveTxn()">保存</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    const saveTxn = async () => {
      const txn = {
        id: 't' + Date.now(),
        type: document.getElementById('txnType').value,
        category: document.getElementById('txnCategory').value,
        amount: parseFloat(document.getElementById('txnAmount').value) || 0,
        date: document.getElementById('txnDate').value,
        description: document.getElementById('txnDesc').value
      };
      await addData('transactions', txn);
      document.querySelector('.modal-overlay').remove();
      renderTransactions(document.getElementById('main-content'));
    };

    const deleteTxn = async (id) => {
      if (confirm('确定删除？')) {
        await deleteData('transactions', id);
        renderTransactions(document.getElementById('main-content'));
      }
    };

    const renderCalendar = async (container) => {
      const projects = await getAll('projects');
      const today = new Date();
      const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
      const monthName = today.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' });

      let html = `<div class="page-header"><h2>日程日历</h2><span style="font-size:18px;font-weight:600">${monthName}</span></div>`;
      html += `<div class="card"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;
      html += ['日','一','二','三','四','五','六'].map(d => `<div style="padding:12px;text-align:center;background:#f8f9fa;font-weight:600">${d}</div>`).join('');
      for (let i = 0; i < firstDay; i++) html += `<div style="padding:8px;min-height:80px;border:1px solid #eee"></div>`;
      for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const dayProjects = projects.filter(p => p.shoot_date === dateStr);
        html += `<div style="padding:8px;min-height:80px;border:1px solid #eee"><div style="font-size:16px;font-weight:600">${i}</div>`;
        dayProjects.forEach(p => {
          html += `<div style="font-size:10px;padding:2px;background:#dbeafe;color:#2563eb;border-radius:4px;margin:2px 0">${p.name}</div>`;
        });
        html += `</div>`;
      }
      html += `</div></div>`;
      container.innerHTML = html;
    };

    const renderStatistics = async (container) => {
      const [projects, transactions] = await Promise.all([getAll('projects'), getAll('transactions')]);
      const today = new Date();
      const monthlyData = [];
      for (let i = 0; i < 12; i++) {
        const month = new Date(today.getFullYear(), i, 1).toISOString().slice(0, 7);
        const mProjects = projects.filter(p => p.order_date?.startsWith(month));
        const mTxns = transactions.filter(t => t.date?.startsWith(month));
        monthlyData.push({ month: month.slice(5), income: mTxns.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0), expense: mTxns.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0) });
      }

      container.innerHTML = `
        <div class="page-header"><h2>数据统计</h2></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">项目总数</div><div class="value">${projects.length}</div></div>
          <div class="stat-card income"><div class="label">总收入</div><div class="value">${formatMoney(transactions.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0))}</div></div>
          <div class="stat-card expense"><div class="label">总支出</div><div class="value">${formatMoney(transactions.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0))}</div></div>
          <div class="stat-card profit"><div class="label">净利润</div><div class="value">${formatMoney(transactions.filter(t => t.type === '收入').reduce((s, t) => s + t.amount, 0) - transactions.filter(t => t.type === '支出').reduce((s, t) => s + t.amount, 0))}</div></div>
        </div>
        <div class="card">
          <div class="card-title">月度收支统计</div>
          <div class="chart-container"><canvas id="statsChart"></canvas></div>
        </div>
      `;

      setTimeout(() => {
        new Chart(document.getElementById('statsChart'), {
          type: 'bar',
          data: {
            labels: monthlyData.map(d => d.month),
            datasets: [{ label: '收入', data: monthlyData.map(d => d.income), backgroundColor: '#22c55e' },
                       { label: '支出', data: monthlyData.map(d => d.expense), backgroundColor: '#ef4444' }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }, 100);
    };

    const renderSettings = async (container) => {
      container.innerHTML = `
        <div class="page-header"><h2>系统设置</h2></div>
        <div class="card">
          <div class="card-title">数据管理</div>
          <button class="btn btn-primary" onclick="backupData()">导出数据备份</button>
          <button class="btn btn-secondary" onclick="restoreData()" style="margin-left:10px">从备份恢复数据</button>
          <button class="btn btn-secondary" onclick="restoreFromScreenshots()" style="margin-left:10px">从截图恢复数据</button>
        </div>
        <div class="card">
          <div class="card-title">应用设置</div>
          <div class="form-group"><label>工作室名称</label><input type="text" id="studioName" value="PhotoStudio"></div>
          <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
        </div>
      `;
    };

    const backupData = async () => {
      const data = {};
      data.clients = await getAll('clients');
      data.projects = await getAll('projects');
      data.transactions = await getAll('transactions');
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    };

    const restoreData = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (data.clients) for (const c of data.clients) await addData('clients', c);
          if (data.projects) for (const p of data.projects) await addData('projects', p);
          if (data.transactions) for (const t of data.transactions) await addData('transactions', t);
          alert('恢复成功！');
        } catch (e) { alert('恢复失败: ' + e.message); }
      };
      input.click();
    };

    const restoreFromScreenshots = async () => {
      if (!confirm('此操作将导入示例数据，确定继续？')) return;
      for (const p of sampleProjects) await addData('projects', p);
      for (const c of sampleClients) await addData('clients', c);
      for (const t of sampleTransactions) await addData('transactions', t);
      alert('已导入示例数据！');
    };

    const saveSettings = () => {
      alert('设置已保存');
    };

    initDB().then(() => {
      initData().then(() => renderDashboard(document.getElementById('main-content')));
    }).catch(e => {
      document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:50px;color:#ef4444"><h1>数据库初始化失败</h1><p>${e.message}</p></div>`;
    });
  </script>
</body>
</html>
